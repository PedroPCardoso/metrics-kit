name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    needs: [lint-typecheck]
    strategy:
      matrix:
        node-version: [18, 20, 22]
        nestjs-version: [10, 11]
        exclude:
          - node-version: 18
            nestjs-version: 11
      fail-fast: false
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: metrics
          POSTGRES_PASSWORD: metrics
          POSTGRES_DB: metrics
        options: '--health-cmd "pg_isready -U metrics" --health-interval 3s --health-timeout 5s --health-retries 20'
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: metrics
          MYSQL_PASSWORD: metrics
          MYSQL_DATABASE: metrics
        options: '--health-cmd "mysqladmin ping -h 127.0.0.1 -u root -proot" --health-interval 3s --health-timeout 5s --health-retries 40'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Override NestJS version
        if: matrix.nestjs-version != '10'
        run: npm install @nestjs/common@^${{ matrix.nestjs-version }} @nestjs/core@^${{ matrix.nestjs-version }} @nestjs/testing@^${{ matrix.nestjs-version }} --no-save

      - name: Load MySQL timezone tables
        run: bash scripts/load-mysql-tz.sh

      - name: Run tests (SQLite + Postgres + MySQL)
        run: npm test
        env:
          PG_HOST: postgres
          PG_PORT: 5432
          MYSQL_HOST: mysql
          MYSQL_PORT: 3306

      - name: Build
        run: npm run build

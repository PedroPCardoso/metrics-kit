name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm install

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Typecheck
        run: docker compose run --rm dev npm run typecheck

      - name: Test
        run: docker compose run --rm dev npm test

      - name: Build
        run: docker compose run --rm dev npm run build
